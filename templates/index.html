<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div class="controls">
        <select id="mode">
            <option value="pvp">2 Player (Local)</option>
            <option value="easy">Easy AI</option>
            <option value="hard">Hard AI (Unbeatable)</option>
        </select>
        <button onclick="resetGame()">Restart</button>
    </div>

    <div id="status">Player X's Turn</div>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameOver = false;

        async function makeMove(index) {
            if (board[index] !== "" || gameOver) return;

            board[index] = currentPlayer;
            updateUI();
            if (checkGameOver()) return;

            const mode = document.getElementById('mode').value;
            if (mode !== "pvp") {
                const response = await fetch('/move', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({board: board, mode: mode})
                });
                const data = await response.json();
                if (data.move !== null) {
                    board[data.move] = "O";
                    updateUI();
                    checkGameOver();
                }
            } else {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById('status').innerText = `Player ${currentPlayer}'s Turn`;
            }
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => cells[i].innerText = val);
        }

        function checkGameOver() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let combo of wins) {
                if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[0]] === board[combo[2]]) {
                    document.getElementById('status').innerText = board[combo[0]] + " Wins!";
                    gameOver = true;
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "It's a Draw!";
                return true;
            }
            return false;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameOver = false;
            document.getElementById('status').innerText = "Player X's Turn";
            updateUI();
        }
    </script>
</body>
</html>
