<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic-Tac-Toe Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <div id="status">Your Turn (X)</div>

        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>

        <div class="controls">
            <select id="mode" onchange="resetGame()">
                <option value="pvp">👥 2 Players</option>
                <option value="easy">🐣 Easy AI</option>
                <option value="hard">🧠 Hard AI</option>
            </select>
            <button onclick="resetGame()">Restart Game</button>
        </div>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameOver = false;
        let isProcessing = false;

        async function makeMove(index) {
            if (board[index] !== "" || gameOver || isProcessing) return;

            isProcessing = true;
            board[index] = currentPlayer;
            updateUI();
            
            if (checkGameOver()) {
                isProcessing = false;
                return;
            }

            const mode = document.getElementById('mode').value;
            if (mode !== "pvp") {
                document.getElementById('status').innerText = "AI is thinking...";
                try {
                    const response = await fetch('/move', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({board: board, mode: mode})
                    });
                    const data = await response.json();
                    if (data.move !== null && !gameOver) {
                        board[data.move] = "O";
                        updateUI();
                        if (!checkGameOver()) {
                            document.getElementById('status').innerText = "Your Turn (X)";
                        }
                    }
                } catch (error) {
                    console.error("Move failed:", error);
                    document.getElementById('status').innerText = "Error - Try again";
                } finally {
                    isProcessing = false;
                }
            } else {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById('status').innerText = `Turn: ${currentPlayer}`;
                isProcessing = false;
            }
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => {
                if (val !== "" && cells[i].innerText === "") {
                    cells[i].classList.add('pop');
                }
                cells[i].innerText = val;
                cells[i].style.color = val === "X" ? "#38bdf8" : "#fb7185";
            });
        }

        function checkGameOver() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            const cells = document.querySelectorAll('.cell');
            for (let combo of wins) {
                if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[0]] === board[combo[2]]) {
                    document.getElementById('status').innerText = board[combo[0]] + " Wins!";
                    gameOver = true;
                    combo.forEach(idx => cells[idx].classList.add('winner'));
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "Draw!";
                return true;
            }
            return false;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameOver = false;
            isProcessing = false;
            document.getElementById('status').innerText = "Your Turn (X)";
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => {
                c.innerText = "";
                c.classList.remove('pop', 'winner');
            });
        }
    </script>
</body>
</html>
